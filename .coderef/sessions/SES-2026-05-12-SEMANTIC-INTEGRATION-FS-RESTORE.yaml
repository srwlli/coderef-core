decisions:
  - id: ADJ-01
    summary: >
      Used Object.defineProperty({configurable:true, writable:true}) instead of direct
      property assignment for fs monkey-patching in interceptFileWrites() and restore().
      Vitest's ESM module namespace presents imported fs as non-configurable via direct
      assignment (TypeError: Cannot redefine property), but Object.defineProperty works.
      The vi.mock('fs') pattern in tests provides a configurable mock object, allowing
      the same Object.defineProperty approach to work in both runtime CJS and test contexts.

