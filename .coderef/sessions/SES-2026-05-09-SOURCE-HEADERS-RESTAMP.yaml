decisions:
  - id: FINDING-001
    decision: "Three sequential format corrections needed: (1) @semantic -> @coderef-semantic: 1.0.0 marker, (2) remove brackets from @exports/used_by values, (3) remove colon separator. All three needed for parser's extractTagValue() + parseExportsList() + IDENTIFIER_RE to produce headerStatus: defined."
    rationale: |
      extractTagValue(body, 'exports') uses /@exports\b\s*/ which does NOT consume ':'.
      parseExportsList splits by comma; IDENTIFIER_RE=/^[A-Za-z_][A-Za-z0-9_]*$/.
      Brackets in value cause ': SupportedCliLanguage' (first item) to fail IDENTIFIER_RE.
      Colon in ` @exports:` means value starts with ': A, B' -> first item is ': A'.
      Fix: emit ' * @exports A, B' (no colon, no brackets).

