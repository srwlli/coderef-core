decisions:
  - id: D1
    choice: Heartbeat lives at .coderef/last-scan.json
    rationale: Co-located with other LLOYD-readable .coderef/ machine artifacts; matches LLOYD's existing access pattern; consistent with the foundation-docs-meta.json proposal in DOC-AGE-EXPOSURE-Q5.md
  - id: D2
    choice: 30s default debounce window (not configurable in v1)
    rationale: LLOYD D2 spec specifies 30s; reduces churn under bulk file ops. Exposed as --debounce-ms for opt-in override; can default-tune in v1.1 without breaking the heartbeat schema.
  - id: D3
    choice: Atomic write via temp + rename (not in-place fs.writeFile)
    rationale: LLOYD reads heartbeat on every request; partial writes would corrupt pre-prompt assembly. POSIX rename is atomic on same filesystem; Node fs.renameSync is atomic on Windows for same-volume targets.
  - id: D4
    choice: No RAG re-index on debounce (out of scope; opt-in via --include-rag flag)
    rationale: RAG re-index is expensive (30-120s); separate workflow. Daemon focuses on scan + populate + docs only. Operator can still flip --include-rag if they want it on the daemon.
  - id: D5
    choice: Fix --once exit-code mapping mid-implementation (skipped status -> exit 0, not 1)
    rationale: Initial impl returned exit 1 for any non-pass status; --no-pipeline intentionally produces 'skipped' which is not a failure. Caught by phase-3 schema test; fixed before commit.
  - id: D6
    choice: Use canonical workorders.schema.json field 'depends_on' (not custom 'prerequisite_workorders' or 'blockers')
    rationale: TRACKING/workorders.schema.json has additionalProperties:false. The first-pass authoring used non-schema fields; tracking-validator caught it; reauthored to schema-clean form.
  - id: D7
    choice: Defer SKILLS/CORE/coderef-watch wrapper skill to a follow-up sweep
    rationale: Out of scope for this WO. The pattern of ASSISTANT-side wrappers for new CODEREF-CORE bins is established but not enforced; coderef-pipeline (newer addition) also lacks a wrapper. Both should land in one follow-up sweep.
  - id: D8
    choice: "log-skill skipped: no skills touched during WO"
    rationale: Per close-workorder canonical Step 5.5, /log-skill is conditional on communication.json.skills_touched being non-empty. This WO created CODEREF-CORE source files (src/cli/coderef-watch.ts + heartbeat schema + 3 tests) and CODEREF-CORE docs only; zero ASSISTANT-side SKILL.md or skill.json files were modified. skills_touched is therefore empty; /log-skill is skipped with this auditable note.

