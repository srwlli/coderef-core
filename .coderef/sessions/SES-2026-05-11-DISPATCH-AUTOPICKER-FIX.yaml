    decision: Return null from resolveDispatchPath instead of falling back to dispatch.json
    rationale: >
      The fallback re-surfaced stale completed dispatches (dispatch.json with status=completed)
      as the active dispatch. Null return + exit-2 is the correct not-found contract,
      consistent with --dispatch-file missing-file behavior.

