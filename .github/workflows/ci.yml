name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build BEFORE test: several suites (populate-cli, output-validation-report)
      # exec dist/ binaries — a stale or missing dist fails them spuriously.
      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest run
