## Technical Notes

### Environment Variables Required
- **Pinecone**: `PINECONE_API_KEY`, `PINECONE_INDEX_NAME`, optional `PINECONE_NAMESPACE`
- **Chroma**: `CHROMA_URL` (defaults to http://localhost:8000)

### CLI Usage
```bash
# Index with Pinecone
npx rag-index --project-dir ./myproject --store=pinecone --provider=ollama

# Search with Chroma
npx rag-search --project-dir ./myproject --store=chroma --provider=ollama "query"
```

### Integration Testing
- Verified 768-dim Ollama embeddings work with both stores
- SQLite remains default when no env vars configured
- Unit tests mock clients to avoid network dependencies

