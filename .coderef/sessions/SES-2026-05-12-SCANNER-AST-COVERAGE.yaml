decisions:
  - id: ADJ-01
    summary: >
      Plan rewritten before execution. Original WO assumed tree-sitter needed to be installed
      and new scanner files created. Exploration revealed TreeSitterScanner already existed with
      all 7 grammars installed. Revised scope: flip useTreeSitter to default, wire JSCallDetector,
      fix worker parity.

  - id: ADJ-02
    summary: >
      JSCallDetector wired into tree-sitter path by mutating already-added elements.
      scanner.getElements() returns live array by reference — slicing elementsBefore..end
      gives exactly the elements just added by treeSitterScanner.scanFile(). This avoids
      re-adding elements and matches the useAST branch's enrichment approach.

  - id: ADJ-03
    summary: >
      Two test fixes required. (1) ast-mode: 'should skip file when AST fails and fallback
      disabled' — added useTreeSitter: false because the test specifically targets the useAST
      path; tree-sitter (now default) succeeded on the malformed code before AST ran. (2)
      parallel-path: dedup expectation updated — tree-sitter correctly finds 2 distinct myFunc
      declarations at different lines; dedup only collapses same file:line:name, so 2 is accurate.

