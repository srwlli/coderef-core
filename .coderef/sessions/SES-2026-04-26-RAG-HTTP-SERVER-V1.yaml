decisions:
  - id: D1
    choice: "Use Node stdlib http (no Express dep)"
    rationale: localhost-only JSON API with 4 endpoints; stdlib is sufficient and adds zero deps. System-service posture benefits from minimal moving parts.
  - id: D2
    choice: "Port 52849 (per ROUTER-DESIGN.md integration-points)"
    rationale: Reserved by router design doc; sits next to LLOYD (52847) and Entity Lloyd bridge (52848); leaves 52850-99 for future CodeRef HTTP services.
  - id: D3
    choice: "Pre-request Ollama health probe with 5s cache (degraded-path)"
    rationale: Per LLOYD D3 spec (Ollama-down should not crash the server). Cache prevents probe-on-every-request overhead while keeping detection responsive.
  - id: D4
    choice: "Reuse SemanticSearchService via in-tree deep import"
    rationale: Per Q1 audit — vector-RAG is not in main package export. Server lives in same repo so deep-import is acceptable (no consumer-fragility risk).
  - id: D5
    choice: "POST /api/rag/index spawns rag-index CLI as subprocess (with CODEREF_LLM_PROVIDER=ollama and CODEREF_RAG_LOCAL_ONLY=1 pinned in child env)"
    rationale: Reuses existing CLI logic (idempotent + incremental + --rag-reset support). Avoids re-implementing the indexing orchestrator inside the server.
  - id: D6
    choice: "In-memory per-project mutex for index requests (409 on conflict)"
    rationale: R5 mitigation. Two simultaneous index runs against same project_dir would race writes to .coderef/coderef-vectors.json.
  - id: D7
    choice: "X-Coderef-RAG-API: 1 header for versioning"
    rationale: Per LLOYD D1 spec — versioned JSON contract. Future breaking changes bump the header value; LLOYD pins on read.
  - id: D8
    choice: "Batched Phase 1-4 routing into one source file; Phase 3+4 into one commit"
    rationale: coderef-rag-server.ts is single-file by stdlib http convention (one router); separating endpoint logic across commits would have created artificial diffs. Logged as plan deviation in communication.json.
  - id: D9
    choice: "log-skill skipped: no skills touched during WO"
    rationale: This WO created CODEREF-CORE source + tests + docs only; zero ASSISTANT-side SKILL.md or skill.json files were modified. skills_touched is empty per close-workorder Step 5.5 conditional.

